<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>פסטיבל נוסטלגיה</title>
    <meta
      name="description"
      content="ששטוס, טל מוסרי, עודד פז, אילן רוזנ פלד, מסיבה נוסטלגית. תל אביב, 29.6.2026."
    />
    <meta name="theme-color" content="#245edb" />

    <!-- Open Graph (for the social media ads / link previews) -->
    <meta property="og:title" content="פסטיבל נוסטלגיה" />
    <meta
      property="og:description"
      content="ששטוס, טל מוסרי, עודד פז, אילן רוזנפלד, דיג'יי פסטיגלים סדרות ולהיטי שנות ה-2000"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:url" content="https://nostalgia-festival.co.il/" />
    <!-- og:image must be an ABSOLUTE url to a publicly reachable file, or WhatsApp/Facebook
         show a text-only preview. The file lives in public/ so Vite copies it to the site root. -->
    <!-- Downscaled (1200px) + compressed to ~126KB. WhatsApp silently drops og:images
         over ~600KB, so the original 15.8MB / 4510×3207 PNG never rendered a preview. -->
    <meta property="og:image" content="https://nostalgia-festival.co.il/LogoPreview.jpg" />
    <meta property="og:image:secure_url" content="https://nostalgia-festival.co.il/LogoPreview.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="854" />
    <meta property="og:image:alt" content="פסטיבל נוסטלגיה — 29.6, רדינג 3, פתיחה 19:30" />

    <!-- Twitter / X card (also used by some other scrapers as a fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="פסטיבל נוסטלגיה — שנות ה-2000 חוזרות ליום אחד" />
    <meta name="twitter:description" content="ששטוס, טל מוסרי, עודד פז, אילן רוזנפלד, דיג'יי פסטיגלים סדרות ולהיטי שנות ה-2000" />
    <meta name="twitter:image" content="https://nostalgia-festival.co.il/LogoPreview.jpg" />

    <!-- Real, crawlable favicon files (in public/, copied to the site root).
         Google's search-result favicon does NOT fetch data: URIs — it needs a
         file at a stable URL, ideally a raster of a size that's a multiple of
         48px. PNG is the one Google uses; the SVG is for crisp browser tabs. -->
    <link rel="icon" type="image/png" sizes="144x144" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1042218365430500');
      fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel Code -->
  </head>
  <body>
    <!-- Meta Pixel <noscript> fallback — must live in <body>; an <img> inside
         <noscript> is disallowed in <head> (parse5/HTML spec). -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1042218365430500&ev=PageView&noscript=1"
    /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
